name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    env:
      ENCRYPTION_KEY: ci-test-encryption-key-32chars-long!!
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck shared
        run: npm run lint --workspace=packages/shared

      - name: Typecheck frontend
        run: npm run lint --workspace=packages/frontend

      - name: Typecheck backend
        run: npm run lint --workspace=packages/backend

  build:
    name: Build (tsc + vite build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all workspaces (shared, backend, frontend)
        run: npm run build

      - name: Upload frontend bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/frontend/dist
          retention-days: 7

  banned-words:
    name: Banned Words Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for banned words in user-facing strings
        run: node scripts/check-banned-words.mjs

  test:
    name: Test (vitest)
    runs-on: ubuntu-latest
    needs: [typecheck, build]
    env:
      ENCRYPTION_KEY: ci-test-encryption-key-32chars-long!!
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test frontend
        run: npm run test --workspace=packages/frontend

      - name: Test backend (with coverage gate)
        run: npm run test:coverage --workspace=packages/backend

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: packages/backend/coverage
          retention-days: 7

  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    needs: [typecheck, build]
    env:
      ENCRYPTION_KEY: ci-test-encryption-key-32chars-long!!
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke e2e (boot → Demo brand → run Director)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
