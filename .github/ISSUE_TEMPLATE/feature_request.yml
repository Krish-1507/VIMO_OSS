name: Feature Request
description: Suggest an idea for VIMO
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature. Tell us what problem you're trying to solve.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Who experiences it?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like VIMO to do?
    validations:
      required: true
  - type: textarea
    id: alternative
    attributes:
      label: Alternatives
      description: What alternatives have you considered?
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any screenshots, mockups, or notes
  - type: dropdown
    id: good-first-issue
    attributes:
      label: Good first issue?
      description: |
        Is this a small, well-scoped task suitable for a newcomer? (Maintainers
        also apply the `good first issue` label — see the legend in CONTRIBUTING.md.)
      options:
        - "No"
        - "Yes — small and self-contained"
    validations:
      required: false
