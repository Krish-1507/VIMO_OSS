name: Bug Report
description: Report something that isn't working
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what's wrong
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
  - type: input
    id: version
    attributes:
      label: VIMO Version
      description: What version are you running? (check package.json)
  - type: input
    id: node
    attributes:
      label: Node.js Version
      description: Run `node --version`
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options: [Chrome, Firefox, Safari, Edge, Other]
  - type: dropdown
    id: os
    attributes:
      label: OS
      options: [Windows, macOS, Linux]
